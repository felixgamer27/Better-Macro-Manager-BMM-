name: Test

on:
  repository_dispatch

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: echo "Hola desde MacroDroid" > test.txt

      - run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add test.txt
          git commit -m "Update test.txt" || exit 0
          git push
